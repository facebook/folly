# This file was @generated by getdeps.py

name: mac

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read  #  to fetch code (actions/checkout)
  actions: read  #  to query GitHub Actions cache usage

jobs:
  build:
    runs-on: macOS-latest
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      SCCACHE_GHA_ENABLED: "on"
    steps:

    - name: Show runner info
      run: |
        echo "CPU cores: $(sysctl -n hw.ncpu)"
        sysctl -n machdep.cpu.brand_string
        sysctl -n hw.memsize | awk '{print "Memory: " $1/1073741824 " GB"}'

    - uses: actions/checkout@v6

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        version: "v0.14.0"

    - id: paths
      name: Query paths
      run: python3 build/fbcode_builder/getdeps.py query-paths --recursive --src-dir=. xxhash  >> "$GITHUB_OUTPUT"

    - name: Restore ninja from cache
      id: restore_ninja
      if: ${{ steps.paths.outputs.ninja_SOURCE }}
      uses: actions/cache/restore@v4
      with:
       path: ${{ steps.paths.outputs.ninja_INSTALL }}
       key: ${{ steps.paths.outputs.ninja_CACHE_KEY }}-install
    - name: Build ninja
      if: ${{ steps.paths.outputs.ninja_SOURCE && ! steps.restore_ninja.outputs.cache-hit }}
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --no-tests ninja --extra-cmake-defines '{"CMAKE_CXX_COMPILER_LAUNCHER":"sccache"}'
    - name: Save ninja to cache
      uses: actions/cache/save@v4
      if: ${{ steps.paths.outputs.ninja_SOURCE && ! steps.restore_ninja.outputs.cache-hit }}
      with:
       path: ${{ steps.paths.outputs.ninja_INSTALL }}
       key: ${{ steps.paths.outputs.ninja_CACHE_KEY }}-install

    - name: Restore cmake from cache
      id: restore_cmake
      if: ${{ steps.paths.outputs.cmake_SOURCE }}
      uses: actions/cache/restore@v4
      with:
       path: ${{ steps.paths.outputs.cmake_INSTALL }}
       key: ${{ steps.paths.outputs.cmake_CACHE_KEY }}-install
    - name: Build cmake
      if: ${{ steps.paths.outputs.cmake_SOURCE && ! steps.restore_cmake.outputs.cache-hit }}
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --no-tests cmake --extra-cmake-defines '{"CMAKE_CXX_COMPILER_LAUNCHER":"sccache"}'
    - name: Save cmake to cache
      uses: actions/cache/save@v4
      if: ${{ steps.paths.outputs.cmake_SOURCE && ! steps.restore_cmake.outputs.cache-hit }}
      with:
       path: ${{ steps.paths.outputs.cmake_INSTALL }}
       key: ${{ steps.paths.outputs.cmake_CACHE_KEY }}-install

    - name: Build xxhash
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --src-dir=. xxhash --project-install-prefix xxhash:/usr/local --extra-cmake-defines '{"CMAKE_CXX_COMPILER_LAUNCHER":"sccache"}'

    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Copy artifacts
      run: python3 build/fbcode_builder/getdeps.py fixup-dyn-deps --src-dir=. xxhash _artifacts/mac --project-install-prefix xxhash:/usr/local --final-install-prefix /usr/local
    - uses: actions/upload-artifact@v6
      with:
        name: xxhash
        path: _artifacts

    - name: Test xxhash
      run: python3 build/fbcode_builder/getdeps.py test --build-type RelWithDebInfo --src-dir=. xxhash --project-install-prefix xxhash:/usr/local --extra-cmake-defines '{"CMAKE_CXX_COMPILER_LAUNCHER":"sccache"}'

    - name: Show GitHub Actions cache usage
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh cache list --repo ${{ github.repository }} --sort size_in_bytes --order desc --limit 30
