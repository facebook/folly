# This file was @generated by getdeps.py

name: mac

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read  #  to fetch code (actions/checkout)
  actions: read  #  to query GitHub Actions cache usage

jobs:
  build:
    runs-on: macOS-latest
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      CC: /opt/homebrew/opt/llvm/bin/clang
      CXX: /opt/homebrew/opt/llvm/bin/clang++
      SCCACHE_GHA_ENABLED: "on"
    steps:

    - name: Show runner info
      run: |
        echo "CPU cores: $(sysctl -n hw.ncpu)"
        sysctl -n machdep.cpu.brand_string
        sysctl -n hw.memsize | awk '{print "Memory: " $1/1073741824 " GB"}'

    - uses: actions/checkout@v6

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        version: "v0.14.0"

    - name: Install Homebrew LLVM
      run: brew install llvm

    - id: paths
      name: Query paths
      run: python3 build/fbcode_builder/getdeps.py query-paths --recursive --src-dir=. xxhash  >> "$GITHUB_OUTPUT"

    - name: Build xxhash
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --recursive --src-dir=. xxhash --project-install-prefix xxhash:/usr/local

    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Copy artifacts
      run: python3 build/fbcode_builder/getdeps.py fixup-dyn-deps --src-dir=. xxhash _artifacts/mac --project-install-prefix xxhash:/usr/local --final-install-prefix /usr/local
    - uses: actions/upload-artifact@v6
      with:
        name: xxhash
        path: _artifacts

    - name: Test xxhash
      run: python3 build/fbcode_builder/getdeps.py test --build-type RelWithDebInfo --src-dir=. xxhash --project-install-prefix xxhash:/usr/local

    - name: Show GitHub Actions cache usage
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh cache list --repo ${{ github.repository }} --sort size_in_bytes --order desc --limit 30
