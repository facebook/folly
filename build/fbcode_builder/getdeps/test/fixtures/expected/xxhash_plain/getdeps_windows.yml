name: windows

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read  #  to fetch code (actions/checkout)
  actions: read  #  to query GitHub Actions cache usage

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      SCCACHE_GHA_ENABLED: "on"
    steps:

    - name: Show runner info
      run: |
        echo "CPU cores: $env:NUMBER_OF_PROCESSORS"
        (Get-CimInstance Win32_Processor).Name
        [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB, 1).ToString() + " GB RAM"
      shell: pwsh

    - name: Export boost environment
      run: "echo BOOST_ROOT=%BOOST_ROOT_1_83_0% >> %GITHUB_ENV%"
      shell: cmd

    - name: Fix Git config
      run: >
        git config --system core.longpaths true &&
        git config --system core.autocrlf false &&
        git config --system core.symlinks true
      shell: cmd

    - uses: actions/checkout@v6

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.10
      with:
        version: "v0.14.0"

    - id: paths
      name: Query paths
      run: python build/fbcode_builder/getdeps.py query-paths --recursive --src-dir=. xxhash  >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Build xxhash
      run: python build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --src-dir=. xxhash

    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Copy artifacts
      run: python build/fbcode_builder/getdeps.py fixup-dyn-deps --src-dir=. xxhash _artifacts/windows --final-install-prefix /usr/local
    - uses: actions/upload-artifact@v6
      with:
        name: xxhash
        path: _artifacts

    - name: Test xxhash
      run: python build/fbcode_builder/getdeps.py test --build-type RelWithDebInfo --src-dir=. xxhash

    - name: Show GitHub Actions cache usage
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh cache list --repo ${{ github.repository }} --sort size_in_bytes --order desc --limit 30
