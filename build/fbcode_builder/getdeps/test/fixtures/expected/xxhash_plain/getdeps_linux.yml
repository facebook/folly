# This file was @generated by getdeps.py

name: linux

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

permissions:
  contents: read  #  to fetch code (actions/checkout)
  actions: read  #  to query GitHub Actions cache usage

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      SCCACHE_GHA_ENABLED: "on"
    steps:

    - name: Show runner info
      run: |
        echo "CPU cores: $(nproc)"
        cat /proc/cpuinfo | grep 'model name' | head -1
        free -h

    - uses: actions/checkout@v6

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        version: "v0.14.0"

    - id: paths
      name: Query paths
      run: python3 build/fbcode_builder/getdeps.py query-paths --recursive --src-dir=. xxhash  >> "$GITHUB_OUTPUT"

    - name: Build ninja
      if: ${{ steps.paths.outputs.ninja_SOURCE }}
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --no-tests ninja

    - name: Build cmake
      if: ${{ steps.paths.outputs.cmake_SOURCE }}
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --no-tests cmake

    - name: Build xxhash
      run: python3 build/fbcode_builder/getdeps.py build --build-type RelWithDebInfo --src-dir=. xxhash --project-install-prefix xxhash:/usr/local

    - name: Show sccache stats
      if: always()
      run: sccache --show-stats

    - name: Copy artifacts
      run: python3 build/fbcode_builder/getdeps.py fixup-dyn-deps --strip --src-dir=. xxhash _artifacts/linux --project-install-prefix xxhash:/usr/local --final-install-prefix /usr/local
    - uses: actions/upload-artifact@v6
      with:
        name: xxhash
        path: _artifacts

    - name: Test xxhash
      run: python3 build/fbcode_builder/getdeps.py test --build-type RelWithDebInfo --src-dir=. xxhash --project-install-prefix xxhash:/usr/local

    - name: Show GitHub Actions cache usage
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh cache list --repo ${{ github.repository }} --sort size_in_bytes --order desc --limit 30
